<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | BoardgameGeek.be</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #172036;
        --card: #fff7df;
        --ink: #172036;
        --accent: #ff5a36;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 90, 54, 0.22), transparent 20rem),
          linear-gradient(180deg, #20304d 0%, var(--bg) 100%);
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 28rem);
        border: 4px solid var(--ink);
        border-radius: 24px;
        background: var(--card);
        padding: 28px;
        box-shadow: 0 14px 0 rgba(10, 15, 25, 0.38);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        color: var(--ink);
        font-size: 2rem;
      }

      p {
        margin: 0;
        color: #334155;
        line-height: 1.5;
      }

      strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Je bent offline</h1>
      <p><strong>BoardgameGeek.be</strong> kon de nieuwste gegevens niet laden. Zodra je opnieuw verbinding hebt, werkt de app weer normaal.</p>
    </main>
  </body>
</html>
