services:
  postgres:
    image: postgres:16-alpine
    container_name: gezelschapsspelkiezer-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gamenight
      POSTGRES_PASSWORD: gamenight
      POSTGRES_DB: gamenight
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
