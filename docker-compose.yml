services:
  app:
    build: .
    container_name: gezelschapsspelkiezer-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gamenight:gamenight@postgres:5432/gamenight?schema=public
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: gezelschapsspelkiezer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamenight
      POSTGRES_PASSWORD: gamenight
      POSTGRES_DB: gamenight
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
